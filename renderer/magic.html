<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>魔性短片渲染器</title>
<style>
/* 设计尺寸 540x960（CSS px），Playwright deviceScaleFactor=2 → 1080x1920 */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 540px; height: 960px; overflow: hidden; }
body { background: #000; font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; position: relative; }

/* ── 画面层：抖音式构图（虚化背景填充 + 主体居中适距） ── */
.shot {
  position: absolute;
  inset: 0;
  display: none;
  overflow: hidden;
  background: #0a0a0e;
}
.shot .bg {
  position: absolute;
  inset: -40px;
  width: calc(100% + 80px);
  height: calc(100% + 80px);
  object-fit: cover;
  filter: blur(34px) brightness(.45) saturate(1.3);
}
.shot .fgwrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 70px 36px 220px;  /* 底部留字幕区 */
}
.shot .fg {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 22px 70px rgba(0,0,0,.65);
  will-change: transform, filter;
}

/* ── 大字幕：普通句 ── */
.caption {
  position: absolute;
  left: 20px; right: 20px;
  bottom: 110px;
  text-align: center;
  font-size: 52px;
  font-weight: 900;
  line-height: 1.22;
  color: #fff;
  z-index: 10;
  visibility: hidden;
  text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000,
               0 0 40px rgba(0,0,0,.9);
}
/* punch 句：更大、黄色、描边更重 */
.caption.punch {
  font-size: 66px;
  color: #ffd91c;
  text-shadow: -5px -5px 0 #000, 5px -5px 0 #000, -5px 5px 0 #000, 5px 5px 0 #000,
               0 0 60px rgba(255,60,0,.8);
  animation: none;
}

/* ── 进度条（底部细线，给观众节奏感） ── */
.progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 4px;
  background: rgba(255,217,28,.7);
  z-index: 60;
  width: 0%;
  transition: none;
}

/* ── 贴纸层（表情包飞入） ── */
.sticker {
  position: absolute;
  top: 110px; right: 24px;
  width: 150px;
  z-index: 15;
  visibility: hidden;
  filter: drop-shadow(0 10px 26px rgba(0,0,0,.6));
}
.sticker img { width: 100%; border-radius: 12px; }

/* ── 转场白闪 ── */
.flash {
  position: absolute;
  inset: 0;
  background: #fff;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
}

/* ── 全屏插播 ── */
.cutaway {
  position: absolute; inset: 0;
  background: rgba(8,8,12,.92);
  z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px;
  visibility: hidden;
}
.cutaway img { max-width: 78%; max-height: 48%; border-radius: 14px; box-shadow: 0 18px 60px rgba(0,0,0,.7); }
.cutaway .ccap {
  max-width: 86%; text-align: center;
  font-size: 42px; font-weight: 900; line-height: 1.3;
  color: #ffd91c;
  text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000;
}
/* 插播中的小副标题（可选） */
.cutaway .csub2 {
  font-size: 26px; font-weight: 700; color: rgba(255,255,255,.7);
  text-shadow: 0 2px 8px rgba(0,0,0,.8);
}

/* ── 封面（土味大字报） ── */
.cover {
  position: absolute; inset: 0; z-index: 300; visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
  background:
    radial-gradient(110% 80% at 50% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,.6) 100%),
    repeating-conic-gradient(from 0deg at 50% 36%, #1e1e2e 0deg 9deg, #13131c 9deg 18deg);
}
.cover .ctitle {
  max-width: 92%; text-align: center;
  font-size: 62px; font-weight: 900; line-height: 1.18;
  color: #ffd91c;
  text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000,
               0 0 50px rgba(255,180,0,.5);
}
.cover img {
  max-width: 68%; max-height: 40%;
  border: 6px solid #fff; border-radius: 18px;
  transform: rotate(-3deg);
  box-shadow: 0 24px 70px rgba(0,0,0,.8);
}
.cover .csub {
  background: #ff2e2e; color: #fff;
  font-size: 32px; font-weight: 900;
  padding: 12px 28px; border-radius: 12px;
  transform: rotate(1.5deg);
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
}

/* ── 结尾贴片（升级版：大字+副文案+悬念条） ── */
.endcard {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 18px 24px 28px;
  background: linear-gradient(0deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,0) 100%);
  z-index: 50;
  visibility: hidden;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.endcard .ec-main {
  font-size: 32px; font-weight: 900; color: #ffd91c; text-align: center;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
}
.endcard .ec-sub {
  font-size: 22px; font-weight: 700; color: rgba(255,255,255,.75); text-align: center;
}
.endcard .ec-cta {
  margin-top: 4px;
  font-size: 19px; font-weight: 600; color: #ff6b6b; text-align: center;
}
</style>
</head>
<body>

<div id="shots"></div>
<div id="cutaways"></div>
<div class="flash" id="flash"></div>
<div class="progress" id="progress"></div>
<div class="cover" id="cover"></div>
<div class="endcard" id="endcard"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   魔性短片确定性渲染器 v2：window.SV.load(payload) + seek(ms)
   新增：punch 大字幕、进度条、结尾三行贴片
   ═══════════════════════════════════════════════════════════ */
const FLASH_MS   = 80;
const CAPTION_IN = 220;
const STICKER_IN = 360;

let P = null;
let shotEls = [], capEls = [], stkEls = [], cutawayEls = [];
let mediaPairs = [];
let hasEndcard = true;

const clamp01    = u => Math.max(0, Math.min(1, u));
const easeOut    = u => 1 - Math.pow(1 - u, 3);
const easeOutBack = u => { const c = 1.70158; const v = u - 1; return 1 + (c+1)*v*v*v + c*v*v; };
const hash01     = n => { const x = Math.sin(n * 7919.31) * 43758.5453; return x - Math.floor(x); };

/* ── 运镜预设 ── */
const MOTIONS = {
  punch_in(dt, dur) {
    const u = easeOut(clamp01(dt / Math.min(500, dur * 0.4)));
    return { transform: `scale(${1 + 0.18 * u})` };
  },
  pull_back(dt) {
    const u = easeOut(clamp01(dt / 300));
    return { transform: `scale(${1.32 - 0.32 * u})` };
  },
  shake(dt) {
    const u  = clamp01(dt / 650);
    const amp = 10 * Math.exp(-4.2 * u);
    const dx  = amp * Math.sin(dt * 0.09);
    const dy  = amp * 0.7 * Math.sin(dt * 0.117 + 1.3);
    return { transform: `translate(${dx}px, ${dy}px) scale(1.05)` };
  },
  spin_in(dt) {
    const e = easeOutBack(clamp01(dt / 380));
    return { transform: `rotate(${-10 + 10 * e}deg) scale(${1.14 - 0.14 * e})` };
  },
  drift(dt, dur) {
    const u = dt / Math.max(dur, 1);
    return { transform: `translateX(${-10 + 20 * u}px) scale(${1.04 + 0.04 * Math.sin(u * Math.PI)})` };
  },
  strobe_zoom(dt) {
    const step = Math.floor(dt / 330) % 3;
    return { transform: `scale(${1 + 0.06 * step})` };
  },
  glitch(dt) {
    const win      = Math.floor(dt / 480);
    const inGlitch = (dt % 480) < 90;
    if (!inGlitch) return { transform: 'scale(1.02)', filter: 'none' };
    const dx  = (hash01(win) - 0.5) * 24;
    const dy  = (hash01(win + 99) - 0.5) * 16;
    const hue = Math.floor(hash01(win + 7) * 300);
    return {
      transform: `translate(${dx}px, ${dy}px) scale(1.05)`,
      filter:    `hue-rotate(${hue}deg) saturate(2.2) contrast(1.25)`,
    };
  },
  /* 新增：bounce——上下弹跳，适合搞笑/惊喜镜头 */
  bounce(dt, dur) {
    const u   = clamp01(dt / Math.min(600, dur * 0.5));
    const osc = Math.abs(Math.sin(u * Math.PI * 3)) * Math.exp(-u * 3);
    return { transform: `translateY(${-osc * 18}px) scale(${1 + osc * 0.06})` };
  },
  /* 新增：pop——弹出+轻微放大后稳定（金句快剪默认，匹配参考视频卡点弹出） */
  pop(dt) {
    const u = easeOutBack(clamp01(dt / 260));
    return { transform: `scale(${0.6 + 0.4 * u})` };
  },
};

function makeMedia(src, isVideo, cls) {
  let el;
  if (isVideo) {
    el = document.createElement('video');
    el.src = src; el.muted = true; el.preload = 'auto';
  } else {
    el = document.createElement('img');
    el.src = src;
  }
  el.className = cls;
  return el;
}

async function load(payload) {
  P = payload;

  /* 进度条：金句快剪等干净构图可隐藏 */
  document.getElementById('progress').style.display = payload.hide_progress ? 'none' : 'block';

  /* ── 结尾贴片：支持对象格式 {main, sub, cta} 或纯字符串；为空则完全不显示（金句快剪用） ── */
  const ecEl = document.getElementById('endcard');
  ecEl.innerHTML = '';
  const rawEc = payload.endcard;
  hasEndcard = !!(rawEc && (typeof rawEc === 'object'
    ? (rawEc.main || rawEc.sub || rawEc.cta)
    : String(rawEc).trim()));
  if (hasEndcard) {
    const ec = rawEc;
    if (typeof ec === 'object') {
      if (ec.main) { const d = document.createElement('div'); d.className = 'ec-main'; d.textContent = ec.main; ecEl.appendChild(d); }
      if (ec.sub)  { const d = document.createElement('div'); d.className = 'ec-sub';  d.textContent = ec.sub;  ecEl.appendChild(d); }
      if (ec.cta)  { const d = document.createElement('div'); d.className = 'ec-cta';  d.textContent = ec.cta;  ecEl.appendChild(d); }
    } else {
      const d = document.createElement('div'); d.className = 'ec-main'; d.textContent = String(ec); ecEl.appendChild(d);
    }
  }

  const shotsBox = document.getElementById('shots');
  shotsBox.innerHTML = '';
  shotEls = []; capEls = []; stkEls = []; mediaPairs = [];

  for (const s of (payload.shots || [])) {
    const isVideo = !!s.video;
    const src     = s.video || s.image;

    const el  = document.createElement('div');
    el.className = 'shot';

    const bg   = makeMedia(src, isVideo, 'bg');
    el.appendChild(bg);
    const wrap = document.createElement('div');
    wrap.className = 'fgwrap';
    const fg = makeMedia(src, isVideo, 'fg');
    wrap.appendChild(fg);
    el.appendChild(wrap);
    mediaPairs.push(isVideo ? [bg, fg] : null);

    let cap = null;
    if (s.caption) {
      cap = document.createElement('div');
      cap.className = s.punch ? 'caption punch' : 'caption';
      cap.textContent = s.caption;
      el.appendChild(cap);
    }
    capEls.push(cap);

    let stk = null;
    if (s.sticker) {
      stk = document.createElement('div');
      stk.className = 'sticker';
      const si = document.createElement('img');
      si.src = s.sticker;
      stk.appendChild(si);
      el.appendChild(stk);
    }
    stkEls.push(stk);

    shotsBox.appendChild(el);
    shotEls.push(el);
  }

  /* ── 插播 ── */
  const cutawaysBox = document.getElementById('cutaways');
  cutawaysBox.innerHTML = '';
  cutawayEls = [];
  for (const c of (payload.cutaways || [])) {
    const el = document.createElement('div');
    el.className = 'cutaway';
    if (c.image) {
      const img = document.createElement('img'); img.src = c.image; el.appendChild(img);
    }
    if (c.caption) {
      const cap = document.createElement('div');
      cap.className = 'ccap';
      cap.textContent = c.caption;
      if (c.big) cap.style.fontSize = '56px';
      el.appendChild(cap);
    }
    if (c.sub) {
      const sub = document.createElement('div');
      sub.className = 'csub2';
      sub.textContent = c.sub;
      el.appendChild(sub);
    }
    cutawaysBox.appendChild(el);
    cutawayEls.push(el);
  }

  const imgs = [...document.querySelectorAll('img')];
  await Promise.all(imgs.map(im => im.decode().catch(() => {})));
  const vids = [...document.querySelectorAll('video')];
  await Promise.all(vids.map(v => new Promise(res => {
    if (v.readyState >= 2) return res();
    v.addEventListener('loadeddata', res, { once: true });
    v.addEventListener('error',      res, { once: true });
  })));
  return { ok: true, count: shotEls.length };
}

function seekVideo(v, sec) {
  return new Promise(res => {
    const dur    = v.duration || 0;
    const target = dur > 0.05 ? sec % dur : 0;
    if (Math.abs(v.currentTime - target) < 0.001) return res();
    v.addEventListener('seeked', res, { once: true });
    v.addEventListener('error',  res, { once: true });
    v.currentTime = target;
    setTimeout(res, 1500);
  });
}

async function seek(ms) {
  let flashAlpha = 0;
  const waits    = [];
  const total    = P.total_ms || (P.shots && P.shots.length
    ? P.shots[P.shots.length-1].t + P.shots[P.shots.length-1].dur : 1);

  /* ── 进度条 ── */
  document.getElementById('progress').style.width = `${clamp01(ms / total) * 100}%`;

  for (let i = 0; i < shotEls.length; i++) {
    const s      = P.shots[i];
    const el     = shotEls[i];
    const active = ms >= s.t && ms < s.t + s.dur;
    el.style.display = active ? 'block' : 'none';
    if (!active) continue;

    const dt = ms - s.t;
    if (mediaPairs[i]) {
      for (const v of mediaPairs[i]) waits.push(seekVideo(v, dt / 1000));
    }

    const m  = MOTIONS[s.motion] || MOTIONS.punch_in;
    const fx = m(dt, s.dur);
    const fg = el.querySelector('.fg');
    fg.style.transform = fx.transform || 'none';
    fg.style.filter    = fx.filter    || 'none';

    if (dt < FLASH_MS && i > 0) flashAlpha = Math.max(flashAlpha, 1 - dt / FLASH_MS);

    if (capEls[i]) {
      const cu = clamp01((dt - 50) / CAPTION_IN);
      capEls[i].style.visibility = cu > 0 ? 'visible' : 'hidden';
      capEls[i].style.opacity    = String(clamp01(cu * 2.5));
      /* punch 帧：弹入 + 轻微抖动 */
      if (s.punch) {
        const bounce = Math.max(0, Math.sin(clamp01(dt / 180) * Math.PI)) * 0.08;
        capEls[i].style.transform = `scale(${0.4 + 0.6 * easeOutBack(cu) + bounce})`;
      } else {
        capEls[i].style.transform = `scale(${0.5 + 0.5 * easeOutBack(cu)})`;
      }
    }
    if (stkEls[i]) {
      const su = clamp01((dt - 200) / STICKER_IN);
      stkEls[i].style.visibility = su > 0 ? 'visible' : 'hidden';
      const e = easeOutBack(su);
      stkEls[i].style.transform  = `translateX(${(1-e)*260}px) rotate(${25-33*e}deg)`;
    }
  }
  document.getElementById('flash').style.opacity = String(flashAlpha * 0.85);

  /* ── 插播 ── */
  for (let ci = 0; ci < cutawayEls.length; ci++) {
    const c  = P.cutaways[ci];
    const el = cutawayEls[ci];
    const dt = ms - c.t;
    if (dt >= 0 && dt < c.dur) {
      el.style.visibility = 'visible';
      const uin  = clamp01(dt / 200);
      const uout = clamp01((c.dur - dt) / 140);
      el.style.opacity   = String(Math.min(clamp01(uin * 2.5), uout));
      el.style.transform = `scale(${0.84 + 0.16 * easeOutBack(uin)}) rotate(${-3 + 2 * easeOutBack(uin)}deg)`;
    } else {
      el.style.visibility = 'hidden';
    }
  }

  /* ── 结尾贴片：最后一个镜头 45% 处淡入 ── */
  const ecEl = document.getElementById('endcard');
  if (hasEndcard && P.shots && P.shots.length) {
    const last = P.shots[P.shots.length - 1];
    const show = ms >= last.t + last.dur * 0.45;
    ecEl.style.visibility = show ? 'visible' : 'hidden';
    if (show) {
      const u = clamp01((ms - last.t - last.dur * 0.45) / 400);
      ecEl.style.opacity   = String(u);
      ecEl.style.transform = `translateY(${(1 - easeOut(u)) * 20}px)`;
    }
  }

  if (waits.length) await Promise.all(waits);
  return true;
}

async function showCover(c) {
  const el = document.getElementById('cover');
  el.innerHTML = '';
  const t = document.createElement('div'); t.className = 'ctitle'; t.textContent = c.title || ''; el.appendChild(t);
  if (c.image) {
    const im = document.createElement('img'); im.src = c.image; el.appendChild(im);
    await im.decode().catch(() => {});
  }
  if (c.sub) {
    const s = document.createElement('div'); s.className = 'csub'; s.textContent = c.sub; el.appendChild(s);
  }
  el.style.visibility = 'visible';
  return true;
}
function hideCover() { document.getElementById('cover').style.visibility = 'hidden'; }

window.SV = { load, seek, showCover, hideCover };
</script>
</body>
</html>
