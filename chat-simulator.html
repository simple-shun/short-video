<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>聊天段子模拟器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  gap: 16px;
}

/* ── 手机外壳 ── */
.phone {
  width: 375px;
  height: 780px;
  background: #ededed;
  border-radius: 44px;
  border: 12px solid #222;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 0 1px #444, 0 40px 80px rgba(0,0,0,.9);
  position: relative;
}

/* 刘海 */
.phone::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 26px;
  background: #222;
  border-radius: 0 0 18px 18px;
  z-index: 100;
}

/* 状态栏 */
.status-bar {
  height: 42px;
  background: #ededed;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 22px 5px;
  font-size: 12px;
  font-weight: 600;
  color: #111;
  flex-shrink: 0;
}

/* 顶部标题 */
.chat-header {
  background: #ededed;
  padding: 8px 20px 10px;
  text-align: center;
  border-bottom: .5px solid #c0c0c0;
  font-size: 17px;
  font-weight: 500;
  color: #111;
  flex-shrink: 0;
}

/* 消息列表 */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 6px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #ededed;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { display: none; }

/* 时间戳 */
.timestamp {
  text-align: center;
  font-size: 11px;
  color: #999;
  margin: 2px 0 4px;
}

/* 消息行 */
.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .25s ease, transform .25s ease;
}
.msg-row.right { flex-direction: row-reverse; }
.msg-row.show { opacity: 1; transform: translateY(0); }

/* 头像 */
.avatar {
  width: 42px; height: 42px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  overflow: hidden;
  user-select: none;
}

/* 气泡 */
.bubble {
  max-width: 230px;
  border-radius: 4px;
  font-size: 17px;
  line-height: 1.5;
  word-break: break-all;
}

.bubble.text {
  padding: 9px 13px;
  color: #111;
}

.msg-row.left  .bubble.text { background: #fff;    border-radius: 0  8px 8px 8px; }
.msg-row.right .bubble.text { background: #95ec69; border-radius: 8px 0   8px 8px; }

.bubble.image img {
  max-width: 200px;
  max-height: 220px;
  border-radius: 6px;
  display: block;
}

/* 打字指示器 */
.typing-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.typing-row.right { flex-direction: row-reverse; }

.typing-bubble {
  padding: 10px 14px;
  border-radius: 0 8px 8px 8px;
  background: #fff;
  display: flex;
  gap: 5px;
  align-items: center;
}
.typing-row.right .typing-bubble {
  background: #95ec69;
  border-radius: 8px 0 8px 8px;
}

.typing-bubble span {
  width: 7px; height: 7px;
  background: #aaa;
  border-radius: 50%;
  display: block;
  animation: blink 1.1s infinite ease-in-out;
}
.typing-bubble span:nth-child(2) { animation-delay: .18s; }
.typing-bubble span:nth-child(3) { animation-delay: .36s; }

@keyframes blink {
  0%,80%,100% { opacity:.3; transform: scale(.8); }
  40%          { opacity:1;  transform: scale(1.2); }
}

/* 底部输入栏 (装饰) */
.input-bar {
  background: #f0f0f0;
  border-top: .5px solid #c0c0c0;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.input-bar .input-mock {
  flex: 1; height: 34px;
  background: #fff;
  border-radius: 6px;
  border: .5px solid #d0d0d0;
}
.input-bar .icon { font-size: 20px; color: #666; }

/* Home 指示条 */
.home-line {
  height: 28px;
  background: #ededed;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.home-line div {
  width: 110px; height: 4px;
  background: #333;
  border-radius: 3px;
}

/* ── 控制按钮 ── */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}
.btn-green  { background: #07c160; color: #fff; }
.btn-ghost  { background: rgba(255,255,255,.15); color: #fff; }
.btn-ghost:hover { background: rgba(255,255,255,.25); }

.progress { color: rgba(255,255,255,.45); font-size: 13px; min-width: 60px; text-align: center; }

/* 录制模式：隐藏控件 (在 URL 加 ?record) */
.record-mode .controls { display: none !important; }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="status-bar">
    <span>9:41</span>
    <span>⚡ 100%</span>
  </div>
  <div class="chat-header" id="chatTitle">朋友</div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <span class="icon">🎤</span>
    <div class="input-mock"></div>
    <span class="icon">🙂</span>
    <span class="icon" style="font-size:22px;font-weight:300;color:#555">＋</span>
  </div>
  <div class="home-line"><div></div></div>
</div>

<div class="controls">
  <button class="btn btn-ghost" onclick="resetChat()">↺ 重置</button>
  <button class="btn btn-green" id="nextBtn" onclick="nextMessage()">下一条 ▶</button>
  <button class="btn btn-ghost" id="autoBtn" onclick="toggleAuto()">⏵ 自动</button>
  <span class="progress" id="progress">0 / 0</span>
</div>

<script>
/* ═══════════════════════════════════════════
   ✏️  在这里修改段子脚本
   ═══════════════════════════════════════════ */
const CONFIG = {

  title: "和死党的聊天 💬",

  /* 左边（对方）角色 */
  left: {
    avatar: "🐱",      // 任意 emoji 当头像
    bg: "#ffb347"      // 头像背景色
  },

  /* 右边（自己）角色 */
  right: {
    avatar: "🐼",
    bg: "#74b9ff"
  },

  /* 自动播放：打字指示器默认显示时长（毫秒）— 设为 0 关闭 */
  typingMs: 0,

  /* 自动播放：消息出现后等多久发下一条 */
  pauseMs: 1200,

  /* ─── 对话脚本 ───
     side:  "left" | "right"
     text:  消息文字
     image: 图片 URL（可选，与 text 二选一）
     typing: 打字等待时长，不填则用 typingMs 默认值
     pause:  本条发出后停顿，不填则用 pauseMs
  ─────────────────── */
  messages: [
    { side: "left",  text: "兄弟，告诉你个事" },
    { side: "left",  text: "我今天遇到诈骗电话了" },
    { side: "right", text: "啊？没上当吧" },
    { side: "left",  text: "本来要上的" },
    { side: "left",  text: "他问我银行卡里有多少钱" },
    { side: "right", text: "然后呢" },
    { side: "left",  text: "我说37块8", typing: 1400 },
    { side: "right", text: "..." },
    { side: "right", text: "然后他骂你了？" },
    { side: "left",  text: "他挂了" },
    { side: "right", text: "哈哈哈哈哈哈哈哈" },
    { side: "left",  text: "我还没问他怎么变多呢", pause: 2000 },
  ]
}
/* ═══════════════════════════════════════════ */

let idx = 0
let autoTimer = null
let playing = false
let busy = false

/* ── 微信消息提示音（AudioBuffer 精确合成） ── */
let audioCtx = null

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  return audioCtx
}

// 用 PCM 直接合成一个"叮咚"脉冲
// iOS 微信收信声：两个短脉冲，C6(1047Hz) + E6(1319Hz)，间隔 ~80ms
// 钟声包络：瞬间攻击 + 指数衰减（像金属敲击）
function buildWechatBuffer(ctx) {
  const sr       = ctx.sampleRate
  const duration = 0.45          // 总时长秒
  const buf      = ctx.createBuffer(1, sr * duration, sr)
  const data     = buf.getChannelData(0)

  const notes = [
    { freq: 1047, offset: 0,     vol: 0.5,  decay: 18 },  // C6，第一声
    { freq: 1319, offset: 0.085, vol: 0.42, decay: 20 },  // E6，第二声（稍弱稍长）
  ]

  for (const { freq, offset, vol, decay } of notes) {
    const start = Math.floor(offset * sr)
    for (let i = start; i < data.length; i++) {
      const t = (i - start) / sr
      const env = Math.exp(-decay * t)           // 指数衰减
      data[i] += Math.sin(2 * Math.PI * freq * t) * vol * env
    }
  }

  // 限幅，防止两段叠加超过 1
  for (let i = 0; i < data.length; i++) {
    data[i] = Math.max(-1, Math.min(1, data[i]))
  }

  return buf
}

let _wechatBuf = null

function playWechatSound(side) {
  try {
    const ctx = getAudioCtx()
    if (ctx.state === 'suspended') ctx.resume()

    // 只有"收到消息（left）"才播提示音，right 发送静音（或你想要发送音可以改）
    if (side !== 'left') return

    if (!_wechatBuf) _wechatBuf = buildWechatBuffer(ctx)

    const src  = ctx.createBufferSource()
    const gain = ctx.createGain()
    gain.gain.value = 0.9
    src.buffer = _wechatBuf
    src.connect(gain)
    gain.connect(ctx.destination)
    src.start()
  } catch (e) {
    // 静默失败
  }
}

function init() {
  document.getElementById('chatTitle').textContent = CONFIG.title
  // 录制模式
  if (location.search.includes('record')) {
    document.body.classList.add('record-mode')
  }
  updateProgress()
}

function updateProgress() {
  document.getElementById('progress').textContent = `${idx} / ${CONFIG.messages.length}`
}

async function nextMessage() {
  if (busy || idx >= CONFIG.messages.length) return
  busy = true

  const msg = CONFIG.messages[idx]
  const side = msg.side || 'left'

  // 打字指示器（typingMs=0 时跳过）
  const typingDelay = msg.typing ?? CONFIG.typingMs
  let typingEl = null
  if (typingDelay > 0) {
    typingEl = createTyping(side)
    await sleep(typingDelay)
    typingEl.remove()
  }

  // 插入消息
  appendMessage(msg)
  playWechatSound(side)
  idx++
  updateProgress()
  scrollBottom()

  await sleep(msg.pause ?? CONFIG.pauseMs)
  busy = false

  // 自动播放继续
  if (playing) {
    if (idx >= CONFIG.messages.length) stopAuto()
    else scheduleNext()
  }
}

function appendMessage(msg) {
  const container = document.getElementById('messages')
  const side = msg.side || 'left'
  const cfg = CONFIG[side]

  const row = document.createElement('div')
  row.className = `msg-row ${side}`

  const avatar = document.createElement('div')
  avatar.className = 'avatar'
  avatar.style.background = cfg.bg
  avatar.textContent = cfg.avatar

  const bubble = document.createElement('div')

  if (msg.image) {
    bubble.className = 'bubble image'
    const img = document.createElement('img')
    img.src = msg.image
    bubble.appendChild(img)
  } else {
    bubble.className = 'bubble text'
    bubble.textContent = msg.text
  }

  row.appendChild(avatar)
  row.appendChild(bubble)
  container.appendChild(row)

  requestAnimationFrame(() => row.classList.add('show'))
}

function createTyping(side) {
  const container = document.getElementById('messages')
  const cfg = CONFIG[side]

  const row = document.createElement('div')
  row.className = `typing-row ${side}`

  const avatar = document.createElement('div')
  avatar.className = 'avatar'
  avatar.style.background = cfg.bg
  avatar.textContent = cfg.avatar

  const bubble = document.createElement('div')
  bubble.className = 'typing-bubble'
  bubble.innerHTML = '<span></span><span></span><span></span>'

  row.appendChild(avatar)
  row.appendChild(bubble)
  container.appendChild(row)
  scrollBottom()
  return row
}

function scrollBottom() {
  const c = document.getElementById('messages')
  c.scrollTop = c.scrollHeight
}

/* ── 自动播放 ── */
function toggleAuto() {
  playing ? stopAuto() : startAuto()
}

function startAuto() {
  playing = true
  document.getElementById('autoBtn').textContent = '⏸ 暂停'
  if (!busy) nextMessage()
}

function stopAuto() {
  playing = false
  clearTimeout(autoTimer)
  document.getElementById('autoBtn').textContent = '⏵ 自动'
}

function scheduleNext() {
  // 由 nextMessage 末尾直接调用，不再额外 setTimeout
  nextMessage()
}

function resetChat() {
  stopAuto()
  idx = 0
  busy = false
  document.getElementById('messages').innerHTML = ''
  updateProgress()
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)) }

/* ── 键盘快捷键 ── */
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowRight') { e.preventDefault(); nextMessage() }
  if (e.code === 'KeyR') resetChat()
  if (e.code === 'KeyA') toggleAuto()
})

/* 点击手机屏幕前进 */
document.getElementById('phone').addEventListener('click', nextMessage)

init()
</script>
</body>
</html>
